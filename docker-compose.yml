services:
  borsapy-alert:
    build:
      context: ./borsapy-alert
    container_name: borsapy-alert
    env_file:
      - path: ./.env
        required: false
    command:
      - python
      - scripts/run_volume_alert.py
      - --index
      - XU030
      - --dry-run
      - --check-interval
      - "5"
    volumes:
      - ./borsapy-alert/alerts.csv:/app/alerts.csv
    restart: unless-stopped

  borsa-mcp:
    build:
      context: ./borsa-mcp
    container_name: borsa-mcp
    command:
      - borsa-mcp
    stdin_open: true
    tty: true
    restart: unless-stopped

  us-research:
    build:
      context: ./apps/us_research
    container_name: us-research
    env_file:
      - path: ./.env
        required: false
    command:
      - python
      - scripts/test_openbb.py
    restart: "no"

  openbb-mcp:
    build:
      context: ./apps/openbb-mcp
    container_name: openbb-mcp
    env_file:
      - path: ./.env
        required: false
    command:
      - openbb-mcp
      - --transport
      - streamable-http
      - --port
      - "8001"
      - --host
      - 0.0.0.0
    ports:
      - "8001:8001"
    restart: unless-stopped

  valuation-app:
    build:
      context: .
      dockerfile: apps/valuation/Dockerfile
    container_name: valuation-app
    command:
      - streamlit
      - run
      - apps/valuation/src/valuation/streamlit_app.py
      - --server.address=0.0.0.0
      - --server.port=8502
    ports:
      - "8502:8502"
    volumes:
      - ./data:/data
    restart: unless-stopped

  valuation-refresh:
    build:
      context: .
      dockerfile: apps/valuation/Dockerfile
    container_name: valuation-refresh
    command:
      - python
      - scripts/refresh_bist_cache.py
      - --index
      - XU100
      - --db-path
      - /data/valuation_cache.sqlite
    volumes:
      - ./data:/data
    restart: "no"
